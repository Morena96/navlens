name: navlens
description: "Runtime navigation visualizer for Flutter — see, inspect and export your app's navigation flow live."
version: 0.1.0

# pub.dev requires at least one of `repository` or `homepage`; `repository`
# is preferred so that "View source" and "Report an issue" links work out
# of the box.
repository: https://github.com/Morena96/navlens
issue_tracker: https://github.com/Morena96/navlens/issues

# Topics improve pub.dev discoverability. Max 5 topics, lowercase, short.
topics:
  - navigation
  - debugging
  - devtools
  - visualization
  - observer

environment:
  sdk: ^3.11.4
  # NavLens uses Material 3 APIs (e.g. `surfaceContainerHighest`,
  # `Color.withValues`) that landed in Flutter 3.27. Pin the minimum
  # accordingly so pub.dev's pana can't score us down for missing bounds.
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# NavLens is a pure Dart/Flutter package — no platform channels, no native
# code — so it does NOT declare a `flutter.plugin.platforms` map. That map
# is only for plugins with native implementations; adding it to a pure
# package would make pub.dev reject the publish. Instead, pub.dev detects
# platform support automatically from the imports (all pure Dart, Flutter
# framework only) and lists Android, iOS, Web, macOS, Windows and Linux.
flutter:
